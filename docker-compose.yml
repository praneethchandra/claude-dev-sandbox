services:
  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLAUDE_CODE_VERSION: latest
        HTTP_PROXY:  ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY:    ${NO_PROXY:-}
    image: claude-dev-sandbox:latest
    container_name: claude-dev
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      # ── Auth (uncomment ONE in .env) ─────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_USE_BEDROCK=${CLAUDE_CODE_USE_BEDROCK:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-aws_region_not_set}
      - CLAUDE_CODE_USE_VERTEX=${CLAUDE_CODE_USE_VERTEX:-}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
      # ── Proxy (for corporate networks) ───────────────────────
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      - no_proxy=${NO_PROXY:-localhost,127.0.0.1}
      # ── General ──────────────────────────────────────────────
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - TERM=xterm-256color
      - COLORTERM=truecolor
    volumes:
      # Projects workspace (use docker-compose.override.yml to mount ~/projects)
      - workspace:/workspace
      # Persists OAuth credentials, mode config, audit log, metrics
      - claude-config:/root/.claude
    networks:
      - claude-net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    dns_search: []
    healthcheck:
      test: ["CMD", "claude", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  workspace:
    name: claude-workspace
  claude-config:
    name: claude-config

networks:
  claude-net:
    driver: bridge
