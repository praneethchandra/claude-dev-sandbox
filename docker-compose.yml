services:
  claude-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CLAUDE_CODE_VERSION: latest
    image: claude-dev-sandbox:latest
    container_name: claude-dev
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      # ── Auth method 1: API key ──────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # ── Auth method 2: OAuth token ──────────────────────────
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # ── Auth method 3: AWS Bedrock ──────────────────────────
      - CLAUDE_CODE_USE_BEDROCK=${CLAUDE_CODE_USE_BEDROCK:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_PROFILE=${AWS_PROFILE:-}
      # ── Auth method 4: Google Vertex AI ─────────────────────
      - CLAUDE_CODE_USE_VERTEX=${CLAUDE_CODE_USE_VERTEX:-}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
      # ── Auth method 5: LLM Gateway ──────────────────────────
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      # ── General ─────────────────────────────────────────────
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - WORKSPACE_NAME=${WORKSPACE_NAME:-workspace}
      - CLAUDE_CODE_DISABLE_TELEMETRY=${CLAUDE_CODE_DISABLE_TELEMETRY:-0}
      - TERM=xterm-256color
      - COLORTERM=truecolor
    volumes:
      # Projects workspace
      - workspace:/workspace
      # Persists mode config, OAuth credentials, metrics, audit log
      - claude-config:/root/.claude
    networks:
      - claude-net
    healthcheck:
      test: ["CMD", "claude", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  workspace:
    name: claude-workspace
  claude-config:
    name: claude-config

networks:
  claude-net:
    driver: bridge
